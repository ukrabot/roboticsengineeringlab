      "acceptedAnswer": {
        "@type": "Answer",
        "text": "CSA Z434 is the principal Canadian standard for industrial robots and robot systems. Provincial occupational health and safety requirements may also apply depending on where the robot cell is installed."
      }
    },
    {
      "@type": "Question",
      "name": "Are collaborative robots safe without fences?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Not automatically. A collaborative robot is not inherently safe in every installation. The complete application, including the tool, payload, sharp edges, workpiece, speed, reach, pinch points, and surrounding equipment, must be assessed through a documented risk assessment."
      }
    },
    {
      "@type": "Question",
      "name": "What is the difference between a light curtain and a safety laser scanner?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A light curtain creates a straight optical detection field and is commonly used at access openings. A safety laser scanner creates configurable two-dimensional protected zones and is useful where fixed guarding is impractical or where a robot must slow down as a person approaches."
      }
    },
    {
      "@type": "Question",
      "name": "Who is responsible for robot cell safety compliance?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Responsibility is shared across the robot manufacturer, system integrator, employer, safety professional, and facility management. The employer operating the cell must ensure that the final installed system is risk assessed, safeguarded, documented, maintained, and used by trained personnel."
